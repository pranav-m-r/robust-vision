defaults:
  - base_config
  - _self_

train_pipeline:
  _target_: src.train_pipeline.TrainPipeline

  data:
    train_path: ${hydra:runtime.cwd}/data/train.pt

  training:
    seed: 42
    epochs: 25
    batch_size: 64
    lr: 1e-5
    num_classes: 10
    augmentation_factor: 1

  loss:
    # Generalised cross-entropy exponent (0 < q <= 1; lower = more robust)
    q: 0.7
    # Truncation threshold
    k: 0.5

eval_pipeline:
  _target_: src.eval_pipeline.EvalPipeline

  data:
    model_path: ${hydra:runtime.cwd}/results/train/2026-02-28_21-07-36/base_model.pt
    val_path: ${hydra:runtime.cwd}/data/val.pt
    test_path: ${hydra:runtime.cwd}/data/val_sanity.pt

  training:
    seed: 42
    batch_size: 64
    num_classes: 10
    noise_rate: 0.3

  temperature:
    t_min: 2
    t_max: 2
    steps: 1

logging:
  log_dir: logs
  results_dir: results
  console: true
