defaults:
  - base_config
  - _self_

train_pipeline:
  _target_: src.train_pipeline.TrainPipeline

  data:
    train_path: ${hydra:runtime.cwd}/data/train.pt
    checkpoint_path: null

  training:
    seed: 42
    epochs: 50
    batch_size: 64
    lr: 1e-3
    weight_decay: 1e-4
    warmup_epochs: 2
    eta_min: 1e-6
    grad_clip_norm: 1.0
    num_classes: 10
    augmentation_factor: 3

  loss:
    # Generalised cross-entropy exponent (0 < q <= 1; lower = more robust)
    q: 0.7
    # Truncation threshold
    k: 0.5

eval_pipeline:
  _target_: src.eval_pipeline.EvalPipeline

  data:
    model_path: ${hydra:runtime.cwd}/results/train/2026-02-28_23-58-41/base_model.pt
    val_path: ${hydra:runtime.cwd}/data/val.pt
    test_path: ${hydra:runtime.cwd}/data/val_sanity.pt
    test_suite_path: ${hydra:runtime.cwd}/data/test_suite_public.pt

  training:
    seed: 42
    batch_size: 64
    num_classes: 10

  temperature:
    t_min: 0.1
    t_max: 10.0

logging:
  log_dir: logs
  results_dir: results
  console: true
